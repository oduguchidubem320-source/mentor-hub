<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MentorHub - Find Your Perfect Mentor</title>
  <link rel="stylesheet" href="./login.css">
</head>
<body>
  <div class="container">
    <div class="text-section">
      <h2 class="header">Login in to MentorHub</h2>
      <p class="tagline">Connect with mentors who understand your goals</p>
      <p class="tagline">Discover opportunities, advice, and support tailored to your career path</p>
      <p class="tagline">Every Login brings you closer to your perfect mentor</p>
    </div>

    <div class="form-section">
      <form class="login-form" action="./index.html">
        <div class="form-row">
          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Enter your email" required>
        </div>

        <div class="form-row">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required>
          <p>Password should be at least 6 characters</p>
        </div>

        <button class="btn" type="submit">Login</button>
      </form>
      <p class="extra">New here? <a href="./Register.html" class="create">Create an account</a></p>
    </div>
  </div>
</body>
</html>
